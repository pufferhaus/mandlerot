# mandleROT journald cap. Bookworm enables persistent journal storage at
# /var/log/journal/* by default; without a cap this can quietly consume
# multiple GB on a busy Pi. These limits keep the on-disk journal well
# under the SD card budget while still leaving ~2 weeks of recent history
# for `journalctl -u mandlerot`.
[Journal]
SystemMaxUse=200M
SystemKeepFree=500M
SystemMaxFileSize=50M
MaxRetentionSec=2week
