# mandleROT default keymap.
#
# Each entry maps a physical key + (optional) modifier into an Action label.
# The label is parsed by `Action::from_label`. RawKey strings follow these
# conventions:
#
#   - Single chars: "1", "a", "/" (literal)
#   - Named: "Tab", "Enter", "Esc", "Backspace", "Space", "F1", "F2", ...
#   - Numpad keys: "Numpad0", "Numpad1", ..., "NumpadAdd", "NumpadSubtract",
#     "NumpadMultiply", "NumpadDivide", "NumpadDecimal", "NumpadEnter",
#     "NumLock"
#   - Backslash: "Backslash"
#
# `modifier` may be: "Shift" (keyboard) or "NumLock" (numpad). Held modifiers
# only — they don't generate their own Actions.

[[binding]]
key = "Tab"
action = "AdvanceMode"

# Esc is the primary keyboard Panic. Backspace is repurposed below as
# SceneCycleActive next; a double-tap of either Backspace OR Esc still
# fires Panic via the global double-tap watcher in `main.rs` (the
# unconditional escape hatch survives menu open). Numpad operators have
# the `-` + `+` + `Enter` chord as their emergency route.
[[binding]]
key = "Esc"
action = "Panic"

# Scene-cycle bindings on the rotated cheap pad. NumLock (corner key) is
# physically dead on the production unit's firmware — it emits no evdev
# events at all — so the previous-scene action moved to `*`
# (NumpadMultiply). NEXT-scene cycling currently has no dedicated key on
# the numpad; pair with Enter to toggle layers if you want the inactive
# side first.
[[binding]]
key = "NumpadMultiply"
action = "SceneCycle:active:-1"

# Backslash on the keyboard now opens the next mode (Scene → Param →
# Look). Layer-toggle still lives on Enter / NumpadEnter below.
[[binding]]
key = "Backslash"
action = "AdvanceMode"

[[binding]]
key = "NumpadEnter"
action = "ToggleLayer"

# Slot keys 1-9 (top row keyboard) — Slot Action with n=1..9
[[binding]]
key = "1"
action = "Slot:1"
[[binding]]
key = "2"
action = "Slot:2"
[[binding]]
key = "3"
action = "Slot:3"
[[binding]]
key = "4"
action = "Slot:4"
[[binding]]
key = "5"
action = "Slot:5"
[[binding]]
key = "6"
action = "Slot:6"
[[binding]]
key = "7"
action = "Slot:7"
[[binding]]
key = "8"
action = "Slot:8"
[[binding]]
key = "9"
action = "Slot:9"

# Numpad slot keys — the cheap pad we use lives rotated 90° CCW on the rig,
# so we remap the digits so the 3x3 block reads naturally (1 top-left,
# ascending L→R, T→B) from the operator's POV. Physical key → assigned slot:
#
#   physical 9 → Slot 1       physical 6 → Slot 2     physical 3 → Slot 3
#   physical 8 → Slot 4       physical 5 → Slot 5     physical 2 → Slot 6
#   physical 7 → Slot 7       physical 4 → Slot 8     physical 1 → Slot 9
#
# (Centre stays Slot 5, corners diagonal stays put.) The keyboard's number
# row above is unaffected — those bindings remain identity 1→1, 2→2, etc.
[[binding]]
key = "Numpad1"
action = "Slot:9"
[[binding]]
key = "Numpad2"
action = "Slot:6"
[[binding]]
key = "Numpad3"
action = "Slot:3"
[[binding]]
key = "Numpad4"
action = "Slot:8"
[[binding]]
key = "Numpad5"
action = "Slot:5"
[[binding]]
key = "Numpad6"
action = "Slot:2"
[[binding]]
key = "Numpad7"
action = "Slot:7"
[[binding]]
key = "Numpad8"
action = "Slot:4"
[[binding]]
key = "Numpad9"
action = "Slot:1"

# Crossfade / param ± (keyboard)
# "Equal" and "Minus" are mode-aware: param step in PARAM mode, xfade elsewhere.
# "-" and "=" are raw aliases (MockInput / evdev path).
[[binding]]
key = "Minus"
action = "ParamMinus"
[[binding]]
key = "-"
action = "ParamMinus"
[[binding]]
key = "Equal"
action = "ParamPlus"
[[binding]]
key = "="
action = "ParamPlus"

# Shift+-/= in PARAM mode cycles the selected param's audio band route
# (None→Bass→Lomid→Himid→Treble→Beat→None). No-op outside PARAM mode.
[[binding]]
key = "Minus"
modifier = "Shift"
action = "ParamAudioMinus"
[[binding]]
key = "-"
modifier = "Shift"
action = "ParamAudioMinus"
[[binding]]
key = "Equal"
modifier = "Shift"
action = "ParamAudioPlus"
[[binding]]
key = "="
modifier = "Shift"
action = "ParamAudioPlus"
[[binding]]
key = "BracketLeft"
action = "XfadeMinus"
[[binding]]
key = "BracketRight"
action = "XfadePlus"

# Crossfade / param ± (numpad)
[[binding]]
key = "NumpadSubtract"
action = "XfadeMinus"
[[binding]]
key = "NumpadAdd"
action = "XfadePlus"
# 000-held + numpad xfade keys = parameter step in PARAM mode. Outside
# PARAM mode the underlying ParamMinus/ParamPlus actions are no-ops, so
# accidental hits are harmless. Unmodified `+`/`-` (above) still drive xfade.
[[binding]]
key = "NumpadSubtract"
modifier = "Numpad000"
action = "ParamMinus"
[[binding]]
key = "NumpadAdd"
modifier = "Numpad000"
action = "ParamPlus"

# Trigger / blend / freeze / tap-tempo / audio-bypass
[[binding]]
key = "N"
action = "Trigger"
[[binding]]
key = "Backspace"
action = "Trigger"
[[binding]]
key = "M"
action = "BlendCycle"

# Scene NEXT on the numpad sits on `/`. Paired with `*` (PREV) on the
# same column of the rotated pad so forward/back scrubbing is one-finger.
[[binding]]
key = "NumpadDivide"
action = "SceneCycle:active:1"
[[binding]]
key = "NumpadDivide"
modifier = "Numpad000"
action = "SceneCycle:other:1"
[[binding]]
key = "F"
action = "FreezeToggle"
[[binding]]
key = "Space"
action = "TapTempo"
[[binding]]
key = "L"
action = "TapTempo"
[[binding]]
key = "Numpad0"
action = "TapTempo"
[[binding]]
key = "G"
action = "AudioBypass"
[[binding]]
key = "K"
action = "ChromakeyToggle"
# NumpadDecimal (the "." key on the cheap pad) is now AdvanceMode — the
# most-pressed bottom-row primary. AudioBypass moves to a 000-held combo
# below since it's not in the hot-path of a set.
[[binding]]
key = "NumpadDecimal"
action = "AdvanceMode"

# Numpad-only operator coverage. `000` on the cheap pad is the held-modifier
# of choice — NumLock-on-the-LED-can-flip-firmware-remap concerns made it
# fragile, so the modifier moved off NumLock. The "000" key sends one of
# KEY_KPCOMMA / KEY_KPPLUSMINUS depending on firmware; both map to the
# synthetic `Numpad000` raw key in `src/input/evdev_src.rs`.
[[binding]]
key = "NumpadEnter"
modifier = "Numpad000"
action = "AudioBypass"
[[binding]]
key = "Numpad0"
modifier = "Numpad000"
action = "FreezeToggle"
[[binding]]
key = "NumpadDecimal"
modifier = "Numpad000"
action = "OpenMenu:Settings"

# `000`-held overlays. `000`+`*` mirrors PREV-active to PREV-other so the
# operator can scrub the inactive layer back without first toggling which
# layer is active. `000`+`Bksp` cycles blend mode — the only numpad-side
# path to BlendCycle now that the unmodified `*` is repurposed.
[[binding]]
key = "NumpadMultiply"
modifier = "Numpad000"
action = "SceneCycle:other:-1"
[[binding]]
key = "Backspace"
modifier = "Numpad000"
action = "BlendCycle"

# `000+5` (centre digit, hard to hit by accident) resets every param on the
# active layer to scene defaults. Useful in PARAM mode when a slot has
# drifted. Trade-off: this overrides the implicit "Slot 5 on the other
# layer" template, so the keyboard `Shift+5` (or the Enter-5-Enter dance)
# is the only path to slot 5 on the inactive layer from the numpad.
[[binding]]
key = "Numpad5"
modifier = "Numpad000"
action = "ResetAllParams"

# Dev F-keys (active only in dev builds; safe to include — non-dev builds
# ignore Action::ReloadAllScenes / SceneCycle dispatch when feature is off)
[[binding]]
key = "F1"
action = "DebugOverlayToggle"
[[binding]]
key = "F2"
action = "SceneCycle:A:1"
[[binding]]
key = "F3"
action = "SceneCycle:B:1"
[[binding]]
key = "F4"
action = "OpenMenu:Settings"
[[binding]]
key = "F5"
action = "ReloadAllScenes"
